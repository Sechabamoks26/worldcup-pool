<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 Pool</title>
  <meta name="description" content="Track our World Cup 2026 office pool — teams, fixtures, and live standings." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="World Cup 2026 Office Pool" />
  <meta property="og:description" content="See everyone's teams, fixtures, and pool standings." />
  <meta property="og:image" content="https://flagcdn.com/w640/br.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>

  <header class="header">
    <div class="header__inner">
      <div class="header__brand">
        <span class="header__badge">WC 2026</span>
        <h1>Office Pool</h1>
        <p class="header__sub">Track every pick · Every fixture · Every goal</p>
      </div>
      <div class="header__actions">
        <a id="shareBtn" class="btn btn--whatsapp" href="#" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
          Share on WhatsApp
        </a>
        <button id="copyLinkBtn" class="btn btn--ghost" type="button">Copy link</button>
        <button id="refreshBtn" class="btn btn--ghost" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 3 21 9 15 9"/></svg>
          Refresh
        </button>
        <span id="lastUpdated" class="header__updated">Loading…</span>
      </div>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel panel--leaderboard">
        <h2 class="panel__title">Pool Standings</h2>
        <ol id="leaderboard" class="leaderboard"></ol>
      </section>

      <section class="panel panel--filters">
        <h2 class="panel__title">Filter</h2>
        <div id="participantFilters" class="filters"></div>
        <button id="showAllBtn" class="btn btn--small btn--ghost" type="button">Show all</button>
      </section>
    </aside>

    <section class="content">
      <div id="participantGrid" class="grid"></div>
    </section>
  </main>

  <footer class="footer">
    <p>Data refreshes from live API when available · Fallback fixtures embedded locally</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
